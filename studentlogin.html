<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Signup</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #9333ea;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      overflow: hidden;
      position: relative;
    }

    /* Background elements */
    .bg-blob {
      position: absolute;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.1);
      z-index: 0;
      animation: float 20s infinite linear;
    }

    .blob-1 {
      width: 300px;
      height: 300px;
      top: -150px;
      right: -100px;
      background: radial-gradient(circle, rgba(142, 45, 226, 0.3), transparent 70%);
    }

    .blob-2 {
      width: 200px;
      height: 200px;
      bottom: -100px;
      left: -50px;
      background: radial-gradient(circle, rgba(147, 51, 234, 0.4), transparent 70%);
      animation-delay: -5s;
    }

    .blob-3 {
      width: 150px;
      height: 150px;
      top: 50%;
      left: 10%;
      background: radial-gradient(circle, rgba(213, 163, 255, 0.3), transparent 70%);
      animation-delay: -10s;
      animation-duration: 15s;
    }

    /* Background pattern */
    .bg-pattern {
      position: absolute;
      width: 100%;
      height: 100%;
      background-image: 
        radial-gradient(circle at 25% 25%, rgba(213, 163, 255, 0.1) 2px, transparent 2px),
        radial-gradient(circle at 75% 75%, rgba(142, 45, 226, 0.1) 2px, transparent 2px);
      background-size: 60px 60px;
      z-index: 0;
    }

    @keyframes float {
      0% {
        transform: translate(0, 0) rotate(0deg);
      }
      33% {
        transform: translate(30px, -50px) rotate(120deg);
      }
      66% {
        transform: translate(-20px, 20px) rotate(240deg);
      }
      100% {
        transform: translate(0, 0) rotate(360deg);
      }
    }

    .container {
      background-color: #fff;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 15px 35px rgba(142, 45, 226, 0.3);
      width: 380px;
      text-align: center;
      position: relative;
      z-index: 1;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      overflow: hidden;
    }

    .container:hover {
      transform: translateY(-5px);
      box-shadow: 0 20px 40px rgba(142, 45, 226, 0.4);
    }

    .container::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 5px;
      background: linear-gradient(90deg, #8e2de2, #9333ea, #d5a3ff);
      z-index: 2;
    }

    .container h2 {
      color: #8e2de2;
      margin-bottom: 30px;
      font-size: 28px;
      position: relative;
      padding-bottom: 15px;
    }

    .container h2::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 60px;
      height: 3px;
      background: linear-gradient(90deg, #8e2de2, #d5a3ff);
      border-radius: 3px;
    }

    .input-group {
      text-align: left;
      margin-bottom: 25px;
      position: relative;
    }

    .input-group label {
      display: block;
      margin-bottom: 8px;
      color: #8e2de2;
      font-weight: 600;
      font-size: 14px;
      transition: color 0.3s ease;
    }

    .input-group input {
      width: 100%;
      padding: 14px 15px;
      border: 2px solid #e9d5ff;
      border-radius: 8px;
      outline: none;
      font-size: 16px;
      transition: all 0.3s ease;
      background-color: #faf5ff;
    }

    .input-group input:focus {
      border-color: #8e2de2;
      box-shadow: 0 0 0 3px rgba(142, 45, 226, 0.2);
      background-color: #fff;
    }

    .input-group input:hover {
      border-color: #b47aff;
      background-color: #f3e8ff;
    }

    .input-group i {
      position: absolute;
      right: 15px;
      top: 40px;
      color: #8e2de2;
      font-size: 18px;
    }

    .signup-btn {
      width: 100%;
      padding: 15px;
      background: linear-gradient(90deg, #8e2de2, #9333ea);
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 17px;
      font-weight: 600;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
      letter-spacing: 0.5px;
    }

    .signup-btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
      transition: left 0.7s ease;
    }

    .signup-btn:hover {
      background: linear-gradient(90deg, #7d1dd1, #8e2de2);
      box-shadow: 0 5px 15px rgba(142, 45, 226, 0.4);
      transform: translateY(-2px);
    }

    .signup-btn:hover::before {
      left: 100%;
    }

    .signup-btn:active {
      transform: translateY(1px);
    }

    .google-button {
      width: 100%;
      margin-top: 20px;
      padding: 15px;
      border: 2px solid #d5a3ff;
      border-radius: 8px;
      background-color: white;
      cursor: pointer;
      font-size: 16px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      transition: all 0.3s ease;
      color: #555;
      position: relative;
      overflow: hidden;
    }

    .google-button::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      border-radius: 50%;
      background-color: rgba(213, 163, 255, 0.2);
      transform: translate(-50%, -50%);
      transition: width 0.6s ease, height 0.6s ease;
    }

    .google-button:hover {
      background-color: #f9f3ff;
      border-color: #8e2de2;
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(142, 45, 226, 0.2);
    }

    .google-button:hover::before {
      width: 300px;
      height: 300px;
    }

    .google-button img {
      width: 22px;
      height: 22px;
      transition: transform 0.3s ease;
    }

    .google-button:hover img {
      transform: scale(1.1);
    }

    .signup-link {
      margin-top: 25px;
      font-size: 15px;
      color: #666;
    }

    .signup-link a {
      color: #9b34eb;
      font-weight: bold;
      text-decoration: none;
      position: relative;
      padding-bottom: 2px;
      transition: color 0.3s ease;
    }

    .signup-link a::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      width: 0;
      height: 2px;
      background: linear-gradient(90deg, #9b34eb, #d5a3ff);
      transition: width 0.3s ease;
      border-radius: 1px;
    }

    .signup-link a:hover {
      color: #7d1dd1;
    }

    .signup-link a:hover::after {
      width: 100%;
    }

    /* Password toggle */
    .password-toggle {
      position: absolute;
      right: 15px;
      top: 40px;
      background: none;
      border: none;
      color: #8e2de2;
      cursor: pointer;
      font-size: 18px;
    }

    /* Responsive adjustments */
    @media (max-width: 480px) {
      .container {
        width: 90%;
        padding: 30px 25px;
      }
      
      .blob-1, .blob-2, .blob-3 {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div class="bg-pattern"></div>
  <div class="bg-blob blob-1"></div>
  <div class="bg-blob blob-2"></div>
  <div class="bg-blob blob-3"></div>

  <div class="container">
    <h2>Student Login</h2>
    <form id="loginForm">
      <div class="input-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="Enter your email" required />
        <i class="fas fa-envelope"></i>
      </div>
      <div class="input-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter your password" required />
        <i class="fas fa-lock"></i>
        <button type="button" class="password-toggle" id="togglePassword">
          <i class="fas fa-eye"></i>
        </button>
      </div>
      <button type="submit" class="signup-btn">
        <i class="fas fa-sign-in-alt"></i> Login
      </button>
    </form>
    <button type="button" class="google-button">
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google Logo" />
      Continue with Google
    </button>
    <p class="signup-link">Don't have an account? <a href="STUDENTsignup.html">Signup</a></p>
  </div>

  <script>
    // Toggle password visibility
    const togglePassword = document.getElementById('togglePassword');
    const passwordInput = document.getElementById('password');
    
    togglePassword.addEventListener('click', function() {
      const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
      passwordInput.setAttribute('type', type);
      this.innerHTML = type === 'password' ? '<i class="fas fa-eye"></i>' : '<i class="fas fa-eye-slash"></i>';
    });

    // Form submission handling
    const loginForm = document.getElementById('loginForm');
    loginForm.addEventListener('submit', function(e) {
      e.preventDefault();
      
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      
      // Simple validation
      if (!email || !password) {
        alert('Please fill in all fields');
        return;
      }
      
      // In a real application, you would send this data to a server
      console.log('Login attempt with:', { email, password });
      
      // Simulate login process
      const loginBtn = document.querySelector('.signup-btn');
      const originalText = loginBtn.innerHTML;
      
      loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Logging in...';
      loginBtn.disabled = true;
      
      setTimeout(() => {
        alert('Login functionality would connect to a server in a real application.');
        loginBtn.innerHTML = originalText;
        loginBtn.disabled = false;
      }, 1500);
    });

    // Google button click
    const googleButton = document.querySelector('.google-button');
    googleButton.addEventListener('click', function() {
      const originalText = this.innerHTML;
      this.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Connecting...';
      this.disabled = true;
      
      setTimeout(() => {
        alert('Google authentication would be implemented in a real application.');
        this.innerHTML = originalText;
        this.disabled = false;
      }, 1500);
    });

    // Add floating animation to container on load
    window.addEventListener('load', () => {
      const container = document.querySelector('.container');
      container.style.opacity = '0';
      container.style.transform = 'translateY(20px)';
      
      setTimeout(() => {
        container.style.transition = 'opacity 0.5s ease, transform 0.5s ease';
        container.style.opacity = '1';
        container.style.transform = 'translateY(0)';
      }, 300);
    });
  </script>
</body>
</html>
