<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Ayer Amba Secondary School</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-purple: #6a0dad;
            --secondary-purple: #8a2be2;
            --light-purple: #e6e6fa;
            --dark-purple: #4b0082;
            --accent-gold: #ffd700;
            --white: #ffffff;
            --black: #333333;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }
        
        body {
            background-color: #f9f9f9;
            color: var(--black);
            line-height: 1.6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }
        
        /* Background image with overlay and hover effect */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url(https://ayerambapms.sims.addislearning.edu.et/uploads/gallery/1424e22e6be0c4584f5cd0ddd6fe75742e229daddce11a84c9025a2ab9eae80f345aaf4ace13a24be381d0f4345bd8f5dfafaf136eacf85374e2eb437ba7f07a.jpg);
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: -2;
            transition: all 0.8s ease;
        }
        
        /* Color overlay */
        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(106, 13, 173, 0.85), rgba(75, 0, 130, 0.9));
            z-index: -1;
            transition: all 0.8s ease;
        }
        
        /* Hover effect on background */
        body:hover::before {
            transform: scale(1.05);
        }
        
        body:hover::after {
            background: linear-gradient(135deg, rgba(106, 13, 173, 0.92), rgba(75, 0, 130, 0.95));
        }
        
        .signup-container {
            background-color: var(--white);
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.25);
            width: 100%;
            max-width: 500px;
            overflow: hidden;
            margin: 20px;
            position: relative;
            transition: all 0.4s ease;
            z-index: 1;
        }
        
        /* Container hover effect */
        .signup-container:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
        }
        
        .signup-header {
            background: linear-gradient(135deg, var(--primary-purple), var(--dark-purple));
            color: var(--white);
            padding: 35px 30px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        
        /* Animated header background */
        .signup-header::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: all 0.8s ease;
        }
        
        .signup-header:hover::before {
            left: 100%;
        }
        
        .signup-header h1 {
            font-size: 2.2rem;
            margin-bottom: 10px;
            position: relative;
            z-index: 1;
            letter-spacing: 1px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
        }
        
        .signup-header::after {
            content: '';
            position: absolute;
            bottom: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 20px solid transparent;
            border-right: 20px solid transparent;
            border-top: 20px solid var(--primary-purple);
        }
        
        .signup-body {
            padding: 40px;
        }
        
        .form-group {
            margin-bottom: 30px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 10px;
            font-weight: 600;
            color: var(--dark-purple);
            font-size: 1.1rem;
            transition: color 0.3s ease;
        }
        
        .select-wrapper {
            position: relative;
        }
        
        .select-wrapper::after {
            content: '\f078';
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
            position: absolute;
            top: 50%;
            right: 20px;
            transform: translateY(-50%);
            color: var(--primary-purple);
            pointer-events: none;
            transition: all 0.3s ease;
        }
        
        .form-select {
            width: 100%;
            padding: 16px 20px;
            border: 2px solid var(--light-purple);
            border-radius: 10px;
            appearance: none;
            font-size: 1rem;
            color: var(--black);
            background-color: var(--white);
            transition: all 0.4s ease;
            cursor: pointer;
            font-weight: 500;
        }
        
        /* Enhanced select hover effects */
        .form-select:hover {
            border-color: var(--secondary-purple);
            box-shadow: 0 5px 15px rgba(138, 43, 226, 0.15);
            transform: translateY(-2px);
        }
        
        .form-select:focus {
            outline: none;
            border-color: var(--secondary-purple);
            box-shadow: 0 0 0 4px rgba(138, 43, 226, 0.25);
            transform: translateY(-2px);
        }
        
        /* Hover effect on select wrapper */
        .select-wrapper:hover::after {
            color: var(--secondary-purple);
            transform: translateY(-50%) scale(1.1);
        }
        
        .btn-group {
            display: flex;
            justify-content: space-between;
            margin-top: 40px;
            gap: 15px;
        }
        
        .btn {
            padding: 15px 35px;
            border-radius: 35px;
            text-decoration: none;
            font-weight: bold;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            font-size: 1rem;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            z-index: 1;
        }
        
        /* Button hover effects */
        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: all 0.6s ease;
            z-index: -1;
        }
        
        .btn:hover::before {
            left: 100%;
        }
        
        .btn-primary {
            background-color: var(--secondary-purple);
            color: var(--white);
            border: none;
            box-shadow: 0 6px 20px rgba(138, 43, 226, 0.4);
            flex-grow: 1;
        }
        
        .btn-primary:hover {
            background-color: var(--primary-purple);
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 10px 25px rgba(138, 43, 226, 0.5);
        }
        
        .btn-outline {
            background-color: transparent;
            border: 2px solid var(--secondary-purple);
            color: var(--secondary-purple);
            flex-grow: 1;
        }
        
        .btn-outline:hover {
            background-color: var(--light-purple);
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 10px 25px rgba(138, 43, 226, 0.2);
        }
        
        /* Link styling inside buttons */
        .btn a {
            text-decoration: none;
            color: inherit;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        /* Responsive design */
        @media (max-width: 576px) {
            .signup-body {
                padding: 30px 25px;
            }
            
            .btn-group {
                flex-direction: column;
                gap: 15px;
            }
            
            .btn {
                width: 100%;
                padding: 14px 30px;
            }
            
            .signup-header h1 {
                font-size: 1.8rem;
            }
            
            .form-group label {
                font-size: 1rem;
            }
        }
        
        /* Add a subtle floating animation to the container */
        @keyframes float {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-10px);
            }
        }
        
        .signup-container {
            animation: float 6s ease-in-out infinite;
        }
    </style>
</head>
<body>
    <div class="signup-container">
        <div class="signup-header">
            <h1>Select your type </h1>
        </div>
        
        <div class="signup-body">
            <div class="form-group">
                <div class="select-wrapper"> 
                     <form onsubmit="getoption(event)">
    <label for="user-type"><h2>Select user type:</h2></label>
    <select id="user-type" class="form-select">
      <option value=""><b>Select</b></option>
      <option value="student">Student</option>
      <option value="parent">Parent</option>
      <option value="teacher">Teacher</option>
      <option value="admin">Admin</option>
    </select>

<script>
                   function getoption(event) {
      event.preventDefault(); // Prevent form from submitting the default way

      let roleselect = document.getElementById("user-type");
      let selected_value = roleselect.value;

      if (selected_value === "student") {
        window.location.href = "STUDENTsignup.html";
      } else if (selected_value === "parent") {
        window.location.href = "parentsignup.html";
      } else if (selected_value === "teacher") {
        window.location.href = "teacherlogin.html";
      } else if (selected_value === "admin") {
        window.location.href = "admin.html";
      } else {
        alert("Please select a user type.");
      }
    }
  </script>
            <div class="btn-group">
                <button class="btn btn-outline"><a href="home.html">Back</a></button>
                <button class="btn btn-primary" type="submit">Continue</button>
            </div>
        </form>
                
            </div>
      
</body>
</html>
