<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login</title>
  <style>
    body {
      margin: 0;
      font-family: 'Arial', sans-serif;
      background: linear-gradient(135deg, 
        #9b34eb 0%, 
        #9b34eb 25%, 
        #8a2fd8 25%, 
        #8a2fd8 50%, 
        #7a2ac5 50%, 
        #7a2ac5 75%, 
        #6a25b2 75%, 
        #6a25b2 100%);
      background-size: 400% 400%;
      animation: gradientBG 15s ease infinite;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
      position: relative;
    }

    /* Animated gradient background */
    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* Subtle floating particles */
    body::before {
      content: '';
      position: absolute;
      width: 100%;
      height: 100%;
      background-image: 
        radial-gradient(circle at 20% 30%, rgba(255, 255, 255, 0.1) 2px, transparent 2px),
        radial-gradient(circle at 80% 70%, rgba(255, 255, 255, 0.1) 2px, transparent 2px),
        radial-gradient(circle at 40% 50%, rgba(255, 255, 255, 0.1) 2px, transparent 2px),
        radial-gradient(circle at 65% 15%, rgba(255, 255, 255, 0.1) 2px, transparent 2px),
        radial-gradient(circle at 25% 85%, rgba(255, 255, 255, 0.1) 2px, transparent 2px);
      background-size: 400px 400px, 350px 350px, 300px 300px, 450px 450px, 500px 500px;
      animation: float 20s linear infinite;
      z-index: 0;
    }

    @keyframes float {
      0% { transform: translate(0, 0) rotate(0deg); }
      100% { transform: translate(50px, 50px) rotate(360deg); }
    }

    .login-container {
      background-color: rgba(255, 255, 255, 0.95);
      padding: 40px;
      border-radius: 20px;
      box-shadow: 
        0 20px 40px rgba(0, 0, 0, 0.15),
        0 0 0 1px rgba(255, 255, 255, 0.1),
        0 0 50px rgba(155, 52, 235, 0.2);
      width: 100%;
      max-width: 400px;
      box-sizing: border-box;
      text-align: center;
      position: relative;
      z-index: 1;
      backdrop-filter: blur(10px);
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      transform: translateY(0);
    }

    .login-container:hover {
      transform: translateY(-5px);
      box-shadow: 
        0 25px 50px rgba(0, 0, 0, 0.2),
        0 0 0 1px rgba(255, 255, 255, 0.2),
        0 0 80px rgba(155, 52, 235, 0.3);
    }

    .login-container h2 {
      color: #9b34eb;
      margin-bottom: 30px;
      font-size: 32px;
      font-weight: 700;
      letter-spacing: 1px;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
      position: relative;
      display: inline-block;
      padding-bottom: 10px;
    }

    .login-container h2::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 60px;
      height: 3px;
      background: linear-gradient(90deg, transparent, #9b34eb, transparent);
      border-radius: 2px;
    }

    .form-group {
      text-align: left;
      margin-bottom: 24px;
      position: relative;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: #9b34eb;
      font-weight: 600;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      transition: all 0.3s ease;
    }

    .form-group:hover label {
      transform: translateX(5px);
      color: #871ee2;
    }

    .form-group input {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid #e0d0f5;
      border-radius: 10px;
      font-size: 15px;
      box-sizing: border-box;
      transition: all 0.3s ease;
      background: rgba(255, 255, 255, 0.9);
      color: #333;
    }

    .form-group input:focus {
      outline: none;
      border-color: #9b34eb;
      box-shadow: 
        0 0 0 3px rgba(155, 52, 235, 0.15),
        inset 0 0 20px rgba(155, 52, 235, 0.05);
      transform: translateY(-2px);
    }

    .form-group input:hover {
      border-color: #9b34eb;
      box-shadow: 0 5px 15px rgba(155, 52, 235, 0.1);
    }

    .login-button {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #9b34eb 0%, #871ee2 100%);
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-size: 16px;
      font-weight: 600;
      margin-top: 10px;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      letter-spacing: 1px;
      text-transform: uppercase;
      position: relative;
      overflow: hidden;
    }

    .login-button::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
      transition: 0.5s;
    }

    .login-button:hover {
      background: linear-gradient(135deg, #871ee2 0%, #7519c9 100%);
      transform: translateY(-3px);
      box-shadow: 
        0 15px 30px rgba(135, 30, 226, 0.3),
        0 0 0 2px rgba(255, 255, 255, 0.1);
      letter-spacing: 1.5px;
    }

    .login-button:hover::before {
      left: 100%;
    }

    .login-button:active {
      transform: translateY(-1px);
      box-shadow: 0 5px 15px rgba(135, 30, 226, 0.3);
    }

    .google-button {
      margin-top: 20px;
      width: 100%;
      padding: 14px;
      border: 2px solid #d3a9f5;
      border-radius: 10px;
      background: white;
      color: #9b34eb;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      position: relative;
      overflow: hidden;
    }

    .google-button::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      border-radius: 50%;
      background: rgba(155, 52, 235, 0.1);
      transform: translate(-50%, -50%);
      transition: width 0.6s, height 0.6s;
    }

    .google-button:hover::before {
      width: 300px;
      height: 300px;
    }

    .google-button:hover {
      border-color: #9b34eb;
      background: #9b34eb;
      color: white;
      transform: translateY(-3px);
      box-shadow: 
        0 10px 25px rgba(155, 52, 235, 0.2),
        0 0 0 2px rgba(255, 255, 255, 0.1);
    }

    .google-button img {
      width: 20px;
      height: 20px;
      margin-right: 10px;
      transition: transform 0.3s ease;
    }

    .google-button:hover img {
      transform: scale(1.1) rotate(5deg);
      filter: brightness(0) invert(1);
    }

    .back-link {
      margin-top: 25px;
      font-size: 14px;
      position: relative;
    }

    .back-link a {
      color: #9b34eb;
      font-weight: 600;
      text-decoration: none;
      padding: 8px 16px;
      border-radius: 6px;
      transition: all 0.3s ease;
      position: relative;
      z-index: 1;
    }

    .back-link a::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 100%;
      background: rgba(155, 52, 235, 0.1);
      border-radius: 6px;
      transform: translate(-50%, -50%);
      transition: width 0.3s ease;
      z-index: -1;
    }

    .back-link a:hover::before {
      width: 100%;
    }

    .back-link a:hover {
      color: #871ee2;
      letter-spacing: 0.5px;
      padding: 8px 20px;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <h2>Admin </h2>
    <form>
      <div class="form-group">
        <label for="admin-email">Email</label>
        <input type="email" id="admin-email" placeholder="Enter your admin email" />
      </div>

      <div class="form-group">
        <label for="admin-password">admin Password</label>
        <input type="password" id="admin-password" placeholder="Enter your password" />
      </div>

      <button type="submit" class="login-button">Login</button>
    </form>

    <button class="google-button">
      <img src="https://www.svgrepo.com/show/475656/google-color.svg" alt="Google logo" />
      Login with Google
    </button>

    <p class="back-link"><a href="home.html">Back to Homepage</a></p>
  </div>
</body>
</html>
